# WhatATheme
markdown: kramdown

# URL of the Site
url: ''
# Base URL of the Site (i.e., Name of the Repository in which the Site is hosted)
baseurl: 

# Title of the Site
title: Welcome to the VolCan Lab at uOttawa!
# Description of the Site
description: Volcanoes of Canada and Beyond
# URL of Image of the Site
site-image: /WhatATheme/assets/images/meta.jpg
# Keywords of the Site
site-keywords: Site, Template, Theme
# URL for the Image of custom Favicon
favicon-url: 

# URL of the Image of Custom Hero Image (i.e., the image in the background of the very first section of the Homepage)
heroimage: /assets/images/Turrialba2016.jpg

# Social Media and Contact
# If you don't want to use any icon, you can leave them blank.
email: cdevitre@uottawa.ca
bluesky_username: /
linkedin_username: Charlotte Laila Devitre
github_username:  cljdevitre
googlescholar_username: Charlotte L DeVitre

# Name of the Author
author-name: Charlotte L. J. Devitre
# URL for the Image of the Author
author-image: /assets/images/Headshot_CLJD.jpg
# 60 Words About the Author
author-about: I am a geochemist and volcanologist who loves nature, photography, cooking, swimming.
author-url: https://github.com/cljdevitre

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Build settings
plugins:
  - jekyll-admin
  - jekyll-feed


# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
