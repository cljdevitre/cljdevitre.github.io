<nav class="navbar is-black is-fixed-top" role="navigation" aria-label="main navigation" id="navbar">
    <div class="container">

        <!-- logo -->
        <div class="navbar-brand">
            <a class="navbar-item"
                href="{% if page.layout == 'default' %}{{site.url}}{{site.baseurl}}/#{% else %}{{site.url}}{{site.baseurl}}/{% endif %}">
                <strong>{{site.title}}</strong>
            </a>

            <div class="navbar-burger" data-target="navbar-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <!-- menu -->
        <div class="navbar-menu has-background-black" id="navbar-menu">
            <div class="navbar-end">

                <!-- HOME -->
                <a class="navbar-item {% if page.layout == 'default' %}is-active{% endif %}"
                    href="{% if page.layout == 'default' %}{{site.url}}{{site.baseurl}}/#{% else %}{{site.url}}{{site.baseurl}}/{% endif %}">
                    HOME
                </a>

                <!-- ABOUT -->
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/#about">
                    ABOUT
                </a>

                <!-- ✅ PEOPLE (added manually) -->
                <a class="navbar-item {% if page.url contains 'people' %}is-active{% endif %}"
                    href="{{site.url}}{{site.baseurl}}/people">
                    PEOPLE
                </a>

                <!-- CONTACT -->
                <a class="navbar-item" href="{{site.url}}{{site.baseurl}}/#contact">
                    CONTACT
                </a>

                <!-- ❌ (optional) remove blog -->
                <!--
                <a class="navbar-item {% if page.layout == 'blog' %}is-active{% endif %}"
                    href="{{site.url}}{{site.baseurl}}/blog      $navbarBurgers.forEach(function ($el) {
            $el.addEventListener('click', function () {
                var target = $el.dataset.target;
                var $target = document.getElementById(target);

                $el.classList.toggle('is-active');
                $target.classList.toggle('is-active');
            });
        });
    }
});
</script>
